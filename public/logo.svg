<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" role="img" aria-labelledby="polla-logo-title">
  <title id="polla-logo-title">Polla Mundialista 2026</title>
  <desc>Logo del proyecto Polla Mundialista 2026 — pelota geométrica con estela tricolor verde, azul y rojo.</desc>

  <defs>
    <!-- Gradientes para que las estelas se desvanezcan hacia el origen del movimiento -->
    <linearGradient id="trail-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A8754" stop-opacity="0"/>
      <stop offset="55%" stop-color="#1A8754" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1A8754" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trail-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1E4FD9" stop-opacity="0"/>
      <stop offset="55%" stop-color="#1E4FD9" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1E4FD9" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="trail-red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D80027" stop-opacity="0"/>
      <stop offset="55%" stop-color="#D80027" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#D80027" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- ===== ICONO ===== -->
  <!-- Estela tricolor (la pelota viene en movimiento desde la izquierda) -->
  <g fill="none" stroke-width="7" stroke-linecap="round">
    <path d="M 8 44 Q 36 36, 62 50" stroke="url(#trail-green)"/>
    <path d="M 6 70 Q 38 64, 64 70" stroke="url(#trail-blue)"/>
    <path d="M 8 96 Q 36 92, 62 90" stroke="url(#trail-red)"/>
  </g>

  <!-- Pelota: círculo + paneles geométricos modernos (wireframe) -->
  <g>
    <!-- Círculo principal -->
    <circle cx="112" cy="70" r="44" fill="none" stroke="currentColor" stroke-width="2.8"/>

    <!-- Paneles internos: pentágono central + radios hacia el borde -->
    <g fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- Pentágono central -->
      <path d="M 93 58 L 112 49 L 131 58 L 124 79 L 100 79 Z"/>
      <!-- Radios hacia los bordes -->
      <path d="M 93 58 L 76 55"/>
      <path d="M 131 58 L 148 55"/>
      <path d="M 100 79 L 88 96"/>
      <path d="M 124 79 L 136 96"/>
      <path d="M 112 49 L 112 38"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <g transform="translate(184, 0)">
    <!-- "POLLA" en color del tema -->
    <text x="0" y="64"
          font-family="'Archivo Black', 'Anton', 'Bebas Neue', 'Impact', system-ui, sans-serif"
          font-weight="900" font-size="46" fill="currentColor" letter-spacing="-1.5">POLLA</text>

    <!-- "2026" tricolor -->
    <text x="160" y="64"
          font-family="'Archivo Black', 'Anton', 'Bebas Neue', 'Impact', system-ui, sans-serif"
          font-weight="900" font-size="46" letter-spacing="-1">
      <tspan fill="#1A8754">2</tspan><tspan fill="#1E4FD9">0</tspan><tspan fill="#D80027">2</tspan><tspan fill="currentColor">6</tspan>
    </text>

    <!-- "MUNDIALISTA" con tracking amplio -->
    <text x="3" y="94"
          font-family="'Inter Tight', 'IBM Plex Sans', system-ui, sans-serif"
          font-weight="600" font-size="13" fill="currentColor" opacity="0.55" letter-spacing="8">MUNDIALISTA</text>
  </g>
</svg>
