<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 140" role="img" aria-labelledby="polla-icon-title">
  <title id="polla-icon-title">Polla 2026</title>
  <desc>Icono cuadrado: pelota geométrica rodeada por tres arcos orbitales tricolor.</desc>

  <!-- Anillos orbitales tricolor (rodean la pelota como si fuera el centro del Mundial) -->
  <g fill="none" stroke-width="5.5" stroke-linecap="round">
    <!-- Verde: arco superior -->
    <path d="M 28 48 A 52 52 0 0 1 96 24" stroke="#1A8754"/>
    <!-- Azul: arco derecho -->
    <path d="M 114 52 A 52 52 0 0 1 114 88" stroke="#1E4FD9"/>
    <!-- Rojo: arco inferior -->
    <path d="M 96 116 A 52 52 0 0 1 30 96" stroke="#D80027"/>
  </g>

  <!-- Pelota centrada -->
  <g>
    <!-- Círculo principal -->
    <circle cx="70" cy="70" r="36" fill="none" stroke="currentColor" stroke-width="2.8"/>

    <!-- Paneles geométricos modernos -->
    <g fill="none" stroke="currentColor" stroke-width="2.5"
       stroke-linecap="round" stroke-linejoin="round">
      <!-- Pentágono central -->
      <path d="M 55 60 L 70 53 L 85 60 L 79 78 L 61 78 Z"/>
      <!-- Radios hacia los bordes -->
      <path d="M 55 60 L 43 56"/>
      <path d="M 85 60 L 97 56"/>
      <path d="M 61 78 L 52 92"/>
      <path d="M 79 78 L 88 92"/>
      <path d="M 70 53 L 70 43"/>
    </g>
  </g>
</svg>
